question: |
  Property Characteristics
subquestion: |
  The City uses certain information about your property’s characteristics to determine its market value.  Some of those characteristics are listed below. If any of them are incorrect, this may be a reason the City should lower your tax assessment.  However, it also may be a reason for the City to increase your assessment.  For example, if the City’s records show that your home has three bedrooms, and it actually has five bedrooms, that may increase.
