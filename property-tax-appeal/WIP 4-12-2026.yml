question: |
  Catchall
subquestion: |
  Is there any other reason you think the City should lower your property value?  If so, list it here and propose a new valuation. 
  
  Remember that it is not a valid basis for an appeal to say that you are not happy with how the City is using your taxes, or that you are not getting enough services for your taxes.  It is also not a valid basis for an appeal to say that your tax assessment has gone up too much since last year.  Your appeal must state a reason that your assessment is inaccurate
