question: |
  Market Analysis Question
subquestion: |
  Have any of your neighbors recently sold similar properties to yours for less than your assessed value?  You can either ask your neighbors, or look on websites like [Zillow](https://www.zillow.com/?msockid=135c0f2f9d8a65b721ca1c0d9c486406) to browse recent sales.  Try to find properties within three blocks of yours that are similar in size and condition, and have sold within the past two years.
