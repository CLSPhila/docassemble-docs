---
mandatory: true
code: |
  import requests
  import pandas as pd
  import json
  import re

  def get_data(guessed_address):
      guessed_address = guessed_address.lower()
      symbols = re.split("\\s+", guessed_address)
      guessed_address_wildcard = "%".join(symbols)
  
      url = f"https://phl.carto.com/api/v2/sql?q=SELECT * FROM opa_properties_public WHERE LOWER(location) LIKE '%{guessed_address_wildcard}%'"
      req = requests.get(url)

      if (req.status_code == 400):
        return None
      elif (req.json()['total_rows'] == 0):
        return None
      else:
        json_data = req.json()
        return json_data
  
  def get_all_data(guessed_address):
    data = get_data(guessed_address)
    new_dictionary = {}
    for i in data['rows']:
      new_dictionary[i['location']] = {}
      for key, val in i.items():
        new_dictionary[i['location']][key] = val

    return new_dictionary

  def code_to_condition(code):
    if (code in [1, '1']):
      return 'New Construction'
    elif (code in [2, '2']):
      return 'Rehab'
    elif (code in [3, '3']):
      return 'Above Average'
    elif (code in [4, '4']):
      return 'Average'
    elif (code in [5, '5']):
      return 'Below Average'
    elif (code in [6, '6']):
      return 'Poor'
    elif (code in [7, '7']):
      return 'Shell, Sealed, or Structurally Compromised'
    else:
      return 'Undetermined'

  def code_to_condition_description(code):
    if (code in [1, '1']):
      return "New Construction"
    elif (code in [2, '2']):
      return 'Rehab'
    elif (code in [3, '3']):
      return 'Above Average: A well-maintained home with newer features such as floors, windows,and doors.  Not a new build or complete/recent rehab.'
    elif (code in [4, '4']):
      return 'Average: This is the condition of most homes in Philadelphia.  Use this if your home is in need of some minor maintenance, but is generally livable and well-maintained.'
    elif (code in [5, '5']):
      return 'Below Average: Use this condition code if your home is in need of major repairs, or has serious defects (fallen-in ceilings, sagging porch, cracking walls).  This condition code is also usually the right one to use if a tree has fallen onto your home and caused minor to moderate damage.'
    elif (code in [6, '6']):
      return 'Poor: Use this if your property is in poor enough condition that it is in need of a complete rehabilitation.  This category often includes homes that are unsafe to live in (buckling walls, missing roof pieces, etc.)  Use this condition code if a tree has fallen onto your home and caused major damage.'
    elif (code in [7, '7']):
      return 'Sealed/Structurally Compromised: Use this condition code of your property is a shell and needs to be demolished.'
    else:
      return 'Undetermined'

  def condition_to_code(condition):
    if (code == 'New Construction'):
      return 1
    elif (code == 'Rehab'):
      return 2
    elif (code == 'Above Average'):
      return 3
    elif (code == 'Average'):
      return 4
    elif (code == 'Below Average'):
      return 5
    elif (code == 'Poor'):
      return 6
    elif (code == 'Shell, Sealed, or Structurally Compromised'):
      return 7
    else:
      return 'Undetermined'
