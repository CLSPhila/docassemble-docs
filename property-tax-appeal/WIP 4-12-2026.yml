    Oral hearings generally occur on Zoom, but you have the option of attending the hearing in person.  You will have the opportunity to state your reasons for appeal and submit evidence.  It may be several months or more than a year before you are scheduled for a hearing.
  non-oral hearing: |
    If you choose a non-oral hearing, the Board of Revision of Taxes will review your submission and issue a decision in writing.
