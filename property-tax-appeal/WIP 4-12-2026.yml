continue button field: continuing
question: |
  TAX ASSESSMENT APPEAL SCREENING
subquestion: |

  ## About this Program
  Use this screener to create a form you can give to the County Assistance Office to identify whether you should be exempt from the SNAP work requirements. At the end, you will get a form you can print or email to yourself. Give the form to the County Assistance Office, through uploading it to your My Compass account or delivering it to the office in person or by mail, email, or fax.

  This tax assessment appeal tool highlights some of the common reasons people use to file tax appeals.  These are not the only reasons to support a tax appeal.  If you have questions about whether you should file a tax appeal, you should consult with an attorney or tax professional.

  ## Not a Uniformity Assessment
  This tool does not do a uniformity analysis.  For information about uniformity, see (link to uniformity materials).  If you are considering appealing based on a uniformity challenge, you should consider consulting with an attorney or tax professional.
  
  This tax appeal tool is designed to be used on residential properties assessed at under {one million dollars}.  If you would like to appeal an assessment of a commercial property or a home valued at over one million dollars, you should prepare the appeal yourself or consult with an attorney or tax professional.

  ## Informal Appeals
  
  This screener prepares both the First Level Review appeal (the “informal” appeal filed with the Office of Property Assessment) and the Board of Revision of Taxes appeal (the “formal” appeal).  Property owners may submit either or both of these appeals.
  
  Please note that this assessment tool helps you prepare and file your own appeal.  Community Legal Services is not providing you with legal advice or representation.
  
  Success in your assessment appeal is not guaranteed.  There are many factors that go into property tax assessments.
  
  You should use this form if you are:

    * The record owner of the property

    * An “equitable owner” of the property  (for example, you have inherited the home but not yet put your name on the deed)

    * Required to pay the property taxes for the property

  **I understand the above information and would like to use this assessment appeal tool.**
