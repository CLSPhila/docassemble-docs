terms:
  Above Average: |
    A well-maintained home with newer features such as floors, windows,and doors.  Not a new build or complete/recent rehab.
  Average: |
    This is the condition of most homes in Philadelphia.  Use this if your home is in need of some minor maintenance, but is generally livable and well-maintained.
  Below Average: |
    Use this condition code if your home is in need of major repairs, or has serious defects (fallen-in ceilings, sagging porch, cracking walls).  This condition code is also usually the right one to use if a tree has fallen onto your home and caused minor to moderate damage.
  Poor: |
    Use this if your property is in poor enough condition that it is in need of a complete rehabilitation.  This category often includes homes that are unsafe to live in (buckling walls, missing roof pieces, etc.)  Use this condition code if a tree has fallen onto your home and caused major damage.
  Sealed/Structurally Unsound: |
    Use this condition code of your property is a shell and needs to be demolished.
