  If you think this market value is accurate, but that your property taxes are too high, you should contact your local [elected officials]("https://phlcouncil.com/council-members/")
  
  If you thinks this market value is accurate but you can’t afford your tax bill, you should apply for property tax relief. (link to property tax relief site)
  
